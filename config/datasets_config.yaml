HC3:
  type: text
  category: text
  source: huggingface
  source_path: Hello-SimpleAI/HC3
  download_method: huggingface_hub
  raw_path: 01_raw_data/HC3/
  output_path: 02_processed/pending_review/text/HC3/
  license_type: CC-BY-SA-4.0
  license_source: https://huggingface.co/datasets/Hello-SimpleAI/HC3
  commercial_use: restricted
  redistribution: restricted
  derivative_obligation: share_alike
  pool_assignment: pending_review
  review_status: pending
  restriction_cleared: false
  cleaning_rules:
    min_text_length_zh: 5
    min_text_tokens_en: 3
    remove_blank_text: true
    remove_duplicate_text: true
  label_mapping:
    human: human_written
    chatgpt: ai_generated

GenImage:
  type: image
  category: image
  source: github
  download_method: git_clone
  raw_path: 01_raw_data/GenImage/
  output_path: 02_processed/isolation/license/image/GenImage/
  license_type: CC-BY-NC-SA-4.0 + dataset_terms
  commercial_use: forbidden
  redistribution: restricted
  derivative_obligation: non_commercial+share_alike
  pool_assignment: isolation
  cleaning_rules:
    min_short_edge: 224
    remove_corrupted: true
    remove_near_solid: true

DFDC:
 type: video
  category: video
  source: kaggle
  source_path: https://www.kaggle.com/c/deepfake-detection-challenge
  download_method: kaggle_api
  raw_path: 01_raw_data/DFDC/
  output_path: 02_processed/isolation/license/video/DFDC/
  license_type: kaggle_competition_rules
  commercial_use: unknown
  redistribution: forbidden
  pool_assignment: isolation
  isolation_reason: commercial rights not verifiable from currently accessible official channels
  review_status: pending
  cleaning_rules:
    min_duration_sec: 3
    min_short_edge: 224
    remove_corrupted: true

